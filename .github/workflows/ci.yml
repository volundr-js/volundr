name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: |
          pnpm -r --filter @volundr/types run build
          pnpm -r --filter @volundr/logger run build
          pnpm -r --filter @volundr/rest run build
          pnpm -r --filter @volundr/threads run build
          pnpm -r --filter @volundr/gateway run build
          pnpm -r --filter @volundr/client run build
          pnpm -r --filter @volundr/voice run build
          pnpm -r --filter @volundr/lavalink run build

      - name: Test
        run: npx tsx --test packages/*/tests/*.test.ts
